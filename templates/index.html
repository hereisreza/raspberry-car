<!DOCTYPE html>
<html lang="fa" dir="rtl" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ماشین کنترلی</title>
<link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>

<!-- Header -->
<header class="topbar shrink-0">
    <h1 class="brand">ماشین کنترلی</h1>
    <div class="topbar-actions">
        <button id="emergency-stop" class="btn-stop" type="button">STOP</button>
        <button id="settings-btn" class="icon-btn" type="button" aria-label="تنظیمات">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>
        <button id="theme-toggle" class="icon-btn" type="button" aria-label="تغییر تم">🌙</button>
        <div id="status-badge" class="status-badge is-disconnected">قطع ارتباط</div>
    </div>
</header>

<!-- Telemetry -->
<section class="telemetry-grid shrink-0">
    <div class="card telemetry-card">
        <div class="telemetry-row"><span>CPU</span><span id="tel-cpu-val">0%</span></div>
        <div class="bar-track"><div id="tel-cpu-bar" class="bar-fill c-cpu"></div></div>
    </div>
    <div class="card telemetry-card">
        <div class="telemetry-row"><span>RAM</span><span id="tel-ram-val">0%</span></div>
        <div class="bar-track"><div id="tel-ram-bar" class="bar-fill c-ram"></div></div>
    </div>
    <div class="card telemetry-card">
        <div class="telemetry-row"><span>Temp</span><span id="tel-temp-val">0°C</span></div>
        <div class="bar-track"><div id="tel-temp-bar" class="bar-fill c-temp"></div></div>
    </div>
    <div class="card telemetry-card">
        <div class="telemetry-row"><span>WiFi</span><span id="tel-wifi-val">0%</span></div>
        <div class="bar-track"><div id="tel-wifi-bar" class="bar-fill c-wifi"></div></div>
    </div>
    <div class="card telemetry-card">
        <div class="telemetry-row"><span>Power</span><span id="tel-power-val">OK</span></div>
        <div class="bar-track"><div id="tel-power-bar" class="bar-fill c-power" style="width:100%"></div></div>
    </div>
</section>

<!-- Gauge and drive state -->
<section class="drive-grid shrink-0">
    <div class="card power-card">
        <span class="label">حد توان موتور</span>
        <span id="motor-power-display" class="value">70%</span>
        <span id="drive-mode" class="mode">idle</span>
    </div>

    <div class="card gauge-card" dir="ltr">
        <div class="gauge-header" dir="rtl">
            <span>گاز</span>
            <span id="gauge-direction-label" class="direction">آماده</span>
        </div>
        <div id="gauge-container">
            <svg viewBox="0 0 200 120" aria-label="نمایشگر گاز">
                <defs>
                    <linearGradient id="gauge-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#10b981" />
                        <stop offset="100%" stop-color="#22c55e" />
                    </linearGradient>
                </defs>
                <path d="M 20 100 A 80 80 0 0 1 180 100" pathLength="100" fill="none" stroke="currentColor" class="gauge-track" stroke-width="18" stroke-linecap="round"/>
                <path id="gauge-fill" d="M 20 100 A 80 80 0 0 1 180 100" pathLength="100" fill="none" stroke="url(#gauge-gradient)" stroke-width="18" stroke-linecap="butt" stroke-dasharray="100" stroke-dashoffset="100" opacity="0"/>
            </svg>
            <div class="gauge-readout">
                <span id="gauge-text" class="value">0%</span>
                <div class="reverse-indicator" dir="rtl">
                    <div id="reverse-led" class="reverse-led"></div>
                    <span class="label">عقب</span>
                </div>
            </div>
        </div>
        <div class="motor-bars" dir="rtl">
            <div class="motor-bar-row"><span class="tag">چپ</span><div class="track" dir="ltr"><div id="left-motor-bar" class="fill left" style="width:0%"></div></div><span id="left-motor-val" class="val">0%</span></div>
            <div class="motor-bar-row"><span class="tag">راست</span><div class="track" dir="ltr"><div id="right-motor-bar" class="fill right" style="width:0%"></div></div><span id="right-motor-val" class="val">0%</span></div>
        </div>
    </div>
</section>

<!-- Joysticks -->
<section class="joystick-grid shrink-0" dir="ltr">
    <div>
        <div class="joystick-label" dir="rtl">گاز</div>
        <div id="throttle-zone" class="joystick-zone"></div>
    </div>
    <div>
        <div class="joystick-label" dir="rtl">فرمان</div>
        <div id="steering-zone" class="joystick-zone"></div>
    </div>
</section>

<!-- Logs -->
<section class="card logs-panel grow">
    <div class="logs-header">
        <div class="logs-title">گزارشات سیستم</div>
        <button id="clear-logs" class="btn-clear" type="button">پاک کردن</button>
    </div>
    <div id="log-container" dir="ltr"></div>
</section>

<footer class="app-footer shrink-0">
    <div>سازنده: علوی - ۲۰۲۶</div>
    <a href="https://hereisreza.github.io/raspberry-car/" target="_blank" rel="noopener" class="footer-link">لینک پروژه در گیت‌هاب</a>
</footer>

<!-- Settings modal -->
<div id="settings-modal" class="modal-overlay">
    <div id="settings-panel" class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="settings-header">
            <h2 id="settings-title" class="settings-title">تنظیمات پیشرفته</h2>
            <button id="close-settings" class="btn-close" type="button" aria-label="بستن">✕</button>
        </div>
        <div class="preset-row">
            <button data-preset="soft" class="preset-btn soft" type="button">نرم</button>
            <button data-preset="balanced" class="preset-btn balanced" type="button">متعادل</button>
            <button data-preset="sport" class="preset-btn sport" type="button">سریع</button>
        </div>
        <div id="settings-content"></div>
        <button id="reset-settings" class="btn-reset" type="button">بازگشت به پیش‌فرض امن</button>
    </div>
</div>

<script src="/static/js/dashboard.js"></script>
</body>
</html>
